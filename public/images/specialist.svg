<svg viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="600" fill="#f5f7f6"/>
  
  <!-- Hair -->
  <path d="M 150 100 Q 150 50 250 50 Q 350 50 350 100 L 350 140 Q 350 130 370 120 L 370 180 Q 370 200 350 220 L 150 220 Q 130 200 130 180 L 130 120 Q 150 130 150 140 Z" fill="#3D2817"/>
  
  <!-- Face -->
  <circle cx="250" cy="150" r="60" fill="#d4b5a0"/>
  
  <!-- Eyes -->
  <circle cx="225" cy="140" r="6" fill="#2c3e50"/>
  <circle cx="275" cy="140" r="6" fill="#2c3e50"/>
  
  <!-- Smile -->
  <path d="M 220 160 Q 250 175 280 160" stroke="#8f7d6b" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="235" y="210" width="30" height="30" fill="#d4b5a0"/>
  
  <!-- Shoulders and body -->
  <ellipse cx="250" cy="300" rx="70" ry="80" fill="#d4b5a0"/>
  
  <!-- Arms -->
